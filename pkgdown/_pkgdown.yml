reference:
  - title: "Making"
    desc: |
      Making functions help you obtain networks from inside or outside the package.
  - subtitle: "Importing"
    desc: |
      Functions for importing and exporting networks from and to a range
      of external formats.
    contents:
      - starts_with("read_")
      - starts_with("write_")
  - subtitle: "Inventing"
    desc: |
      Functions for deterministically creating and stochastically generating 
      directed and undirected, one-mode and two-mode networks.
    contents:
      - make_mnet
      - make_stocnet
      - make_explicit
      - make_motifs
      - make_create
      - starts_with("generate_")
  - subtitle: "Collecting"
    desc: |
      Functions for collecting data from external sources, such as interviews or APIs, 
      and converting them into networks.
    contents:
      - starts_with("collect_")
  - subtitle: "Playing"
    desc: |
      Functions for simulating diffusion or learning processes,
      i.e. nodal change, upon networks.
    contents:
      - starts_with("play_")
      
  - title: "Coercion"
    desc: |
      Functions for modifying networks into other classes.
      All functions for coercing networks into other classes have the prefix `as_`.
      Those ending in `list` are extractive, and so will result in some information loss,
      but coercion to and especially between graph classes is as lossless as possible.
    contents:
      - starts_with("as_")

  - title: "Manipulating"
    desc: |
      Functions for manipulating aspects within networks,
      such as their nodes, ties, changes, and network metadata (information).
      This includes functions to add and delete nodes and ties, 
      as well as to add and delete nodal and tie attributes.
  - subtitle: "Info"
    contents:
      - starts_with("add_info")
  - subtitle: "Nodes"
    contents:
      - manip_nodes_num
      - manip_nodes_attr
  - subtitle: "Changes"
    contents:
      - starts_with("manip_changes")
  - subtitle: "Ties"
    contents:
      - manip_ties_num
      - manip_ties_attr
  - subtitle: "Globals"
    contents:
      - starts_with("manip_global")

  - title: "Modifying"
    desc: |
      Functions for modifying networks into other formats.
      This includes functions for reformatting networks into networks
      of the same dimensions but a different type, e.g. from directed to undirected.
      It also includes functions for transforming networks into networks
      with other dimensions, such as from a two-mode network into a one-mode network.
      There are also functions for splitting networks, e.g. into a list of ego networks,
      and rejoining them from such lists.
  - subtitle: "Formatting"
    desc: |
      Functions for reformatting networks, retaining the same network dimensions.
    contents:
      - modif_direction
      - modif_weight
      - modif_labels
      - modif_plexity
  - subtitle: "Transforming"
    desc: |
      Functions for transforming networks, which may change the network's dimensions.
    contents:
      - modif_paths
      - modif_scope
  - subtitle: "Levels"
    desc: |
      Functions for modifying multimodal networks.
    contents:
      - modif_levels
      - modif_project
  - subtitle: "Converting"
    desc: |
      Functions for permuting networks or constructing a network
      from the nodal correlations of another network.
    contents:
      - modif_permutation
      - modif_correlation
  - subtitle: "Splits"
    desc: |
      Functions for splitting networks into a list of networks,
      or (re)joining a list of networks into a single network.
    contents:
      - modif_split
      - starts_with("from_")
  - subtitle: "Missing"
    desc: |
      Functions for modifying how missing data is treated.
    contents:
      - starts_with("na_to_")
      
  - title: "Identifying"
    desc: |
      Functions for identifying properties of networks,
      nodes (where the function prefix is `node_`), or ties (where the function prefix is `tie_`).
  - subtitle: "Network descriptions"
    desc: |
      `describe_*()` functions return a character string describing a network.
    contents:
      - class_describe
  - subtitle: "Network measures"
    desc: |
      `net_*()` functions return a numeric output.
    contents:
      - measure_dims
  - subtitle: "Network members"
    desc: |
      `net_node_*()` and `net_tie_*()` functions return a string vector relating to nodes or ties in the network.
    contents:
      - member_names
  - subtitle: "Network marks"
    desc: |
      `is_*()` functions return a single logical value for the network.
    contents:
      - starts_with("is_")
  - subtitle: "Nodal attributes"
    desc: |
      `node_*()` functions return a vector of values the length
      of the nodes in the network.
    contents:
      - starts_with("node_is_")
  - subtitle: "Tie attributes"
    desc: |
      `tie_*()` functions return a vector of values the length
      of the ties in the network.
    contents:
      - starts_with("tie_is_")
    
  - title: "Practicing"
  - subtitle: "Interface"
    desc: |
      Functions to support new users in learning and interacting with
      network concepts and data.
    contents:
      - glossary
      - interface
      - progress
      
  - title: "Data"
    desc: |
      The package contains a variety of networks useful for pedagogical purposes
      and used in the course 'Social Networks Theories and Methods' and other workshops.
      Each page documents the source of the data and its format.
      References are provided for further reading and citation.
    contents:
      - data_overview
  - subtitle: "Classic data"
    desc: |
      `ison_` include classic datasets used for introducing and teaching 
      network analysis, though are sometimes quite limited in terms of
      the attributes of nodes and ties collected.
    contents:
      - starts_with("ison_")
  - subtitle: "Fictional data"
    desc: |
      `fict_` data are popular fictional datasets, treating recognisable themes,
      and often have more attributes coded.
    contents:
      - starts_with("fict_")
  - subtitle: "Political data"
    desc: |
      `irps_` network data concern various international and domestic political
      networks and problems.
    contents:
      - starts_with("irps_")
  
